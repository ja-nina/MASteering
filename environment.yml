name: ma-testbed
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pytorch::pytorch=2.4.*
  - pytorch::pytorch-cuda=12.1   # CUDA 12.5 driver is backward-compatible
  - pip>=23
  - pip:
    - transformers>=4.47
    - accelerate>=0.34
    - sentencepiece              # Qwen tokenizer
    - pyyaml>=6.0
    - pytest>=7.0
    - openai>=1.0                # vLLM baseline backend
    - textarena>=0.6
    - numpy>=1.24
