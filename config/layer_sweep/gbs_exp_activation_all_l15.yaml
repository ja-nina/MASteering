run_id: gbs_exp_activation_all_l15

game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: activation
  default_config:
    layer: model.layers.15
    vector_path: vectors/tom_sae_top16_gbs_model_layers_15_resid_d16384_k32.npy
    coefficient: 20.0
  per_agent: {}

logging:
  dir: logs/

wandb:
  enabled: true
  project: ma-steering
  name: gbs_exp_activation_all_l15
  tags: [gbs, activation, sae, all_agents, layer_15]
