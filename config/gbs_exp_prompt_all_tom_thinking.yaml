run_id: gbs_exp_prompt_all_tom_thinking
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
episodes: 50
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.6
  enable_thinking: true
  top_p: 0.95
  top_k: 20
  min_p: 0
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    user_prefix: >-
      Before answering, reason explicitly about each other player's mental
      state: given the feedback they have seen so far, what do they believe
      the target to be, and what contribution are they likely to make this
      round? Use this model of other players' beliefs and intentions to choose
      a contribution that moves the group sum as close to the target as
      possible.
  per_agent: {}
logging:
  dir: logs/
wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_prompt_all_tom_thinking
  tags:
  - gbs
  - prompt_injection
  - all_agents
  - tom
