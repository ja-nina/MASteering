run_id: gbs_exp_prompt_all_tom_thinking
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
episodes: 50
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.6
  enable_thinking: true
  top_p: 0.95
  top_k: 20
  min_p: 0
  presence_penalty: 1.0 
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    user_prefix: >-
      steering:
  default: prompt_injection
  default_config:
    user_prefix: |
      Assume the other players are rational and are also attempting to model your reasoning.

      Ask:

      * What contribution would another player expect me to choose?
      * What contribution would they choose in response to that expectation?
      * What contribution is most likely to emerge if all players reason in this way?

      Select the contribution that is most likely to be part of a mutually consistent set of choices across all players. Be concise, do not repeat thinking patterns and end your contribution with CONTRIBUTION: <integer>.
  per_agent: {}
logging:
  dir: logs/
wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_prompt_all_tom_thinking
  tags:
  - gbs
  - prompt_injection
  - all_agents
  - tom
