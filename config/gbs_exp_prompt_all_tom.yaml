run_id: gbs_exp_prompt_all_tom
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 50
episodes: 50
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    user_prefix: |
       Assume the other players are rational and are also attempting to model your reasoning.
       Select the contribution that is most likely to be part of a mutually consistent set of choices across all players. Be concise, do not repeat thinking patterns and end your contribution, start your anwser with first explaining yyour reson STRATEGY: with CONTRIBUTION: <integer>.
  per_agent: {}
logging:
  dir: logs/
wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_prompt_all_tom
  tags:
  - gbs
  - prompt_injection
  - all_agents
  - tom
