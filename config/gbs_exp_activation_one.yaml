run_id: gbs_exp_activation_one

game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: activation
  per_agent:
    player_0:
      layer: model.layers.18
      vector_path: vectors/tom_sae_top16_gbs_model_layers_18_d16384_k32.npy
      coefficient: 20.0

  # no default_config -> only player_0 is steered

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_activation_one
  tags: [gbs, activation, sae, one_agent]
