run_id: beauty_contest_non_thinking_4p_20b
game:
  family: symbolic
  id: beauty_contest
  env_kwargs:
    num_rounds: 10
episodes: 10
model:
  backend: transformers
  model_id: gpt-oss-20b
  enable_thinking: false
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  repetition_penalty: 1.05
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    user_prefix: 'Before answering, think step by step: what does the history tell
      you about the next best move? What are other players likely to do? What do they
      think I am likely to do, judging from their perspective?'
  per_agent: {}
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: beauty_contest_non_thinking_4p_20b
  tags:
  - beauty_contest
  - non_thinking
  - 4p
  - 20b
  - reasoning_sweep
