run_id: gbs_thinking_4p
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 20
    num_players: 4
episodes: 10
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  enable_thinking: true
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: gbs_thinking_4p
  tags:
  - gbs
  - thinking
  - 4p
  - reasoning_sweep
steering:
  default: noop
  per_agent: {}
