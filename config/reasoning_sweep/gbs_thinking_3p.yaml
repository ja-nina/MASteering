run_id: gbs_thinking_3p
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 20
    num_players: 3
episodes: 10
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  enable_thinking: true
  temperature: 0.6
  top_p: 0.95
  top_k: 20
agents:
  count: 3
  concurrency: sequential
  max_parse_retries: 5
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: gbs_thinking_3p
  tags:
  - gbs
  - thinking
  - 3p
  - reasoning_sweep
steering:
  default: noop
  per_agent: {}
