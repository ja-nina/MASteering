run_id: gbs_non_thinking_2p_20b
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 20
episodes: 10
model:
  backend: transformers
  model_id: openai/gpt-oss-20b
  enable_thinking: false
  temperature: 0.7
  top_p: 0.9
  top_k: 20
agents:
  count: 2
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    system_suffix: '

      Reasoning: medium'
    user_prefix: 'Before answering, think step by step: what does the history tell
      you about the next best move? What are other players likely to do? What do they
      think I am likely to do, judging from their perspective?'
  per_agent: {}
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: gbs_non_thinking_2p_20b
  tags:
  - gbs
  - non_thinking
  - 2p
  - 20b
  - reasoning_sweep
