run_id: gbs_tom_4p_20b
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 20
episodes: 100
model:
  backend: transformers
  model_id: openai/gpt-oss-20b
  enable_thinking: false
  temperature: 0.7
  top_p: 0.9
  top_k: 20
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  default_config:
    user_prefix: 'Assume the other players are rational and are also attempting to
      model your reasoning.

      Select the contribution that is most likely to be part of a mutually consistent
      set of choices across all players. Be concise, do not repeat thinking patterns
      and end your contribution, start your anwser with first explaining yyour reson
      STRATEGY: with CONTRIBUTION: <integer>.

      '
  per_agent: {}
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: gbs_tom_4p_20b
  tags:
  - gbs
  - tom
  - 4p
  - 20b
  - reasoning_sweep
