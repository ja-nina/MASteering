run_id: gbs_non_thinking_4p
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 20
    num_players: 4
episodes: 10
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  enable_thinking: false
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
logging:
  dir: logs/reasoning_sweep/
wandb:
  enabled: true
  project: ma-steering-tom-effectiveness
  name: gbs_non_thinking_4p
  tags:
  - gbs
  - non_thinking
  - 4p
  - reasoning_sweep
steering:
  default: prompt_injection
  default_config:
    user_prefix: 'Assume the other players are rational and are also attempting to
      model your reasoning.Before answering, think step by step: what does the history
      tell you about the next best move? What are other players likely to do? What
      do they think I am likely to do, judging from their perspective?'
  per_agent: {}
