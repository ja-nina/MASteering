run_id: gbs_exp_prompt_all_directional

# ToM prompt injection under directional feedback:
# Agents receive direction-only feedback ("too HIGH" / "too LOW") and
# are also injected with a ToM prefix asking them to model other players'
# contributions. This is where ToM is expected to matter most — with no
# numeric error signal, reasoning about what others will do is the primary
# way to estimate the right adjustment magnitude.
# Compare against gbs_exp_noop_directional.yaml to isolate the ToM effect.

game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
    feedback: directional

episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: prompt_injection
  default_config:
    user_prefix: |
      Assume the other players are rational and are also attempting to model your reasoning.

      Ask:

      * What contribution would another player expect me to choose?
      * What contribution would they choose in response to that expectation?
      * What contribution is most likely to emerge if all players reason in this way?

      Select the contribution that is most likely to be part of a mutually consistent set of choices across all players.


  per_agent: {}

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_prompt_all_directional
  tags: [gbs, prompt_injection, all_agents, directional]
