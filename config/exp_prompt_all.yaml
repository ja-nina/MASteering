run_id: exp_prompt_all

game:
  family: symbolic
  id: beauty_contest
  env_kwargs:
    num_rounds: 5
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: prompt_injection
  # default_config applies to ALL agents not listed in per_agent
  default_config:
    user_prefix: >-
      Assume the other players are rational and are also attempting to model your reasoning.

      Ask:

      * What contribution would another player expect me to choose?
      * What contribution would they choose in response to that expectation?
      * What contribution is most likely to emerge if all players reason in this way?

      Select the contribution that is most likely to be part of a mutually consistent set of choices across all players.



  per_agent: {}   # leave empty to steer all players uniformly
                  # or override individuals here, e.g.:
                  # player_0:
                  #   user_prefix: "Think strategically. "

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: exp_prompt_all
  tags: [beauty_contest, prompt_injection, all_agents]
