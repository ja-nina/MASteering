run_id: exp_prompt_all

game:
  family: symbolic
  id: beauty_contest
  env_kwargs:
    num_rounds: 5
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: prompt_injection
  # default_config applies to ALL agents not listed in per_agent
  default_config:
    user_prefix: >-
      Before answering, think carefully about what the other players are
      likely to do. Model their reasoning and best-respond to it.


  per_agent: {}   # leave empty to steer all players uniformly
                  # or override individuals here, e.g.:
                  # player_0:
                  #   user_prefix: "Think strategically. "

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: exp_prompt_all
  tags: [beauty_contest, prompt_injection, all_agents]
