run_id: gbs_exp_prompt_one
game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10
episodes: 50
model:
  backend: transformers
  model_id: Qwen/Qwen3-4B
  temperature: 0.7
  top_p: 0.8
  top_k: 20
agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5
steering:
  default: prompt_injection
  per_agent:
    player_0:
      user_prefix: Before answering, think carefully about what the other players
        are likely to do. Coordinate with them to narrow in on the target faster.
logging:
  dir: logs/
wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_prompt_one
  tags:
  - gbs
  - prompt_injection
  - one_agent
