run_id: beauty_contest_baseline_01

game:
  family: symbolic            # symbolic | textarena
  id: beauty_contest          # beauty_contest | gbs | <TextArena env_id>
  env_kwargs:
    num_rounds: 5
episodes: 1

model:
  backend: transformers       # transformers (steering) | vllm (fast baseline)
  model_id: Qwen/Qwen3-4B
  endpoint: http://localhost:8000
  temperature: 0.7
  top_p: 0.8
  top_k: 20

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: noop               # noop | prompt_injection | activation
  per_agent: {}

logging:
  dir: logs/

wandb:
  enabled: false          # set to true to stream to W&B
  project: ma-steering
  name:                   # defaults to run_id
  tags: []
