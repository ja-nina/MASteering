run_id: gbs_exp_noop

game:
  family: symbolic
  id: gbs
  env_kwargs:
    num_rounds: 10   # GBS ends early when target is found
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen2.5-3B-Instruct
  temperature: 0.7

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: noop
  per_agent: {}

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: gbs_exp_noop
  tags: [gbs, noop, control]
