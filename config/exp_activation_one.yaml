run_id: exp_activation_one

game:
  family: symbolic
  id: beauty_contest
  env_kwargs:
    num_rounds: 5
episodes: 50

model:
  backend: transformers
  model_id: Qwen/Qwen2.5-3B-Instruct
  temperature: 0.7

agents:
  count: 4
  concurrency: sequential
  max_parse_retries: 5

steering:
  default: activation
  per_agent:
    player_0:
      layer: model.layers.18
      vector_path: vectors/tom_sae_top16_beauty_contest_model_layers_18_d16384_k32.npy
      coefficient: 20.0

  # no default_config -> only player_0 is steered

logging:
  dir: logs/

wandb:
  enabled: false
  project: ma-steering
  name: exp_activation_one
  tags: [beauty_contest, activation, sae, one_agent]
